<!-- Page Wrapper -->
<div id="wrapper">
    <app-side-bar></app-side-bar>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        
        <!-- Main Content -->
        <div id="content">
            <app-header></app-header>

            <section class="profile-section">
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-10">
                            <div class="card profile-card border-0">
                                <div class="card-body">
                                    <div class="row align-items-center">
                                        <div class="col-lg-5 text-center">
                                            <img src="https://bootdey.com/img/Content/avatar/avatar7.png" 
                                                 alt="Profile Picture" class="profile-img">
                                        </div>
                                        <div class="col-lg-7">
                                            <div class="profile-header">
                                                <h3 class="text-main mb-1">{{ user.name }}</h3>
                                                <span class="role-tag">Admin</span>
                                            </div>
                                            
                                            <!-- Formulaire de mise à jour du profil -->
                                            <form (ngSubmit)="updateProfile()">
                                                <input type="hidden" [(ngModel)]="user._id" name="_id"> <!-- Champ caché pour l'ID -->

                                                <div class="form-group">
                                                    <label class="text-muted">Nom</label>
                                                    <input type="text" class="form-control" [(ngModel)]="user.name" name="name" required>
                                                </div>

                                                <div class="form-group">
                                                    <label class="text-muted">Email</label>
                                                    <input type="email" class="form-control" [(ngModel)]="user.email" name="email" required>
                                                </div>

                                                <button type="submit" class="btn btn-primary-custom">
                                                    <i class="fas fa-edit"></i> Modifier
                                                </button>
                                            </form>  

                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>


        </div>
                    <!-- Footer -->
<footer >
    <div class="container my-auto">
      <div class="copyright text-center my-auto">
        <p>&copy; Copyright 2025 Maison Des Savoirs. All Rights Reserved.</p>
      </div>
    </div>
  </footer>
  <!-- End of Footer -->
    </div>
</div>
