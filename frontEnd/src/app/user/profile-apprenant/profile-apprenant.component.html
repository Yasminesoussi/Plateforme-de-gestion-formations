<!-- Main Content -->
<div id="content">
    <app-header-user></app-header-user>
  
    <!-- Section Profil -->
    <section class="profile-section">
      <div class="container">
        <div class="text-center mb-5">
          <h1 class="about">Mon Profil</h1>
        </div>
  
        <div class="row justify-content-center">
          <div class="col-lg-10">
            <div class="card profile-card shadow">
              <div class="card-body">
                <div class="row align-items-center">
                  <div class="col-lg-4 text-center mb-4 mb-lg-0">
                   

                    <img 
                    *ngIf="imageUrl" 
                    [src]="imageUrl" 
                    alt="Photo de profil" 
                    class="rounded-circle avatar-image"
                  />
                  

                  </div>
                  <div class="col-lg-8">
                    <div class="profile-header mb-3">
                      <h3 class="text-main mb-1">{{ user.name }}</h3>
                      <span  *ngIf=" user?.role === 'Apprenant'" class="role-tag">Apprenant</span>
                      
                    </div>
  
                    <!-- Formulaire Profil -->
                    <form (ngSubmit)="updateProfile()">
                      <input type="hidden" [(ngModel)]="user._id" name="_id">
                      <div class="form-group mb-3">
                        <label class="text-muted">Nom</label>
                        <input type="text" class="form-control" name="name" [(ngModel)]="user.name" required>
                      </div>
                      <div class="form-group mb-3">
                        <label class="text-muted">Email</label>
                        <input type="email" class="form-control" name="email" [(ngModel)]="user.email" required>
                      </div>
                      <div class="form-group mb-3">
                        <label class="text-muted">Téléphone</label>
                        <input type="tel" class="form-control" name="telephone" [(ngModel)]="user.telephone" required>
                      </div>
                      <div class="form-group mb-4">
                        <label class="text-muted">Adresse</label>
                        <input type="text" class="form-control" name="adresse" [(ngModel)]="user.adresse" required>
                      </div>
                      <button type="submit" class="btn btn-primary-custom w-100">
                        <i class="fas fa-edit"></i> Modifier
                      </button>
                    </form>
  
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
  
      </div>
    </section>
  
   
  
    <!-- Section Description + Formations -->
    <section class="profile-section">
      <div class="container">
  
        <hr class="section-divider">
  
        <!-- Formations affectées -->
        <h2 class="about-text">Mes Formations Inscrites</h2>
  
        <div class="related-formations">
          <div class="row g-4">
            <div class="col-lg-3 col-md-6 col-sm-6" *ngFor="let for of formations">
              <div class="card h-100 shadow-sm border-0 text-center p-3">
                <img [src]="for.image?.path ? 'http://localhost:3000/' + for.image.path : 'assets/default-formation.jpg'"
                  class="img-fluid mb-3 formation-img" alt="Formation image">
                <div class="card-body p-2">
                  <h5 class="card-title fw-bold">{{ for.name }}</h5>
                  <p class="text-muted mb-1" *ngIf="for.formateur">
                    {{ for.formateur.name }}
                  </p>
                  <h6 class="text-primary mb-3">{{ for.prix | currency:'TND':'symbol'}} </h6>
                  <a [routerLink]="['/DetailsFormation', for._id]" class="btn btn-primary btn-sm">
                    En savoir plus
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
  
      </div>
    </section>
  
    <app-footer-user></app-footer-user>
  </div>
