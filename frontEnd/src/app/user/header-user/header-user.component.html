<!-- Navbar Start -->
<nav class="navbar navbar-expand-lg bg-white navbar-light sticky-top p-0 shadow-none border-0">
    <a class="navbar-brand d-flex align-items-center px-4 px-lg-5">
        <img src="../../../assets/user-style/img/maison.jpg" alt="Logo" style="height: 225px; width: auto; margin-top: 60px;">
    </a>

    <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarCollapse">
        <!-- Liens centrés -->
        <div class="navbar-nav mx-auto p-4 p-lg-0">
            <a [routerLink]="'/home'" class="nav-item nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">ACCUEIL</a>
            <a [routerLink]="'/about'" class="nav-item nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">À PROPOS</a>
            <a [routerLink]="'/Courses'" class="nav-item nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">FORMATIONS</a>

            <div class="nav-item dropdown">
                <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">CATÉGORIES</a>
                <div class="dropdown-menu fade-down m-0">
                    <a style="cursor: pointer;" class="dropdown-item" *ngFor="let category of categorys"
                        routerLink="/FormationByCategory/{{category._id}}" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">{{category.name}}</a>
                </div>
            </div>

            <a [routerLink]="'/contact'" class="nav-item nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">CONTACT</a>
        </div>

        <!-- Zone droite : Sign in / profil -->
        <div class="navbar-nav ms-auto pe-4">
            <div class="nav-item dropdown" *ngIf="isLoggedIn">
                <a href="#" *ngIf="user" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="fa fa-user"></i> Bienvenue, {{user.name}}
                </a>
                <div class="dropdown-menu fade-down m-0">
                    <a *ngIf="user?.role === 'formateur'" [routerLink]="'/profileFormateur'" class="dropdown-item" routerLinkActive="active">Profile</a>
                    <a *ngIf="user?.role === 'Apprenant'" [routerLink]="'/profileApprenant'" class="dropdown-item" routerLinkActive="active">Profile</a>

                    <a *ngIf="user?.role === 'formateur'" [routerLink]="'/ChangerPassword'" class="dropdown-item" routerLinkActive="active">Changer mot de passe</a>
                    <a *ngIf="user?.role === 'Apprenant'" [routerLink]="'/changePasswordApprenant'" class="dropdown-item" routerLinkActive="active">Changer mot de passe</a>

                    <a *ngIf="user?.role === 'Apprenant'" [routerLink]="'/payement-apprenant/' + id" class="dropdown-item" routerLinkActive="active">Paiement</a>
                    <a *ngIf="user?.role === 'formateur'" [routerLink]="'/updateCv/' + id" class="dropdown-item" routerLinkActive="active">Update Cv</a>


                    <a *ngIf="user?.role === 'formateur'" [routerLink]="'/detailsFormateur/' + id" class="dropdown-item" routerLinkActive="active">Details</a>
                    

                    
                    <a (click)="signOut()" class="dropdown-item" style="cursor: pointer;"><i class="fa fa-sign-out"></i> Déconnexion</a>
                </div>
            </div>

            <div *ngIf="!isLoggedIn">
                <a class="nav-item nav-link" href="/signInUser">
                    <i class="fa fa-user"></i> Se connecter
                </a>
            </div>
        </div>
    </div>
</nav>
<!-- Navbar End -->
