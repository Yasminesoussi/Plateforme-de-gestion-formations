<app-header-user></app-header-user>

<div class="contact-container">
  <h1 class="about-title">CONTACT</h1>
  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-group">
        <label for="name"> Name <span class="required"></span></label>
        <input type="text" id="name" placeholder="name" formControlName="name" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="email">Email <span class="required"></span></label>
        <input type="email" id="email" placeholder="Enter your email" formControlName="email" required />
      </div>

      <div class="form-group">
        <label for="message">Comment or Message</label>
        <textarea id="message" rows="2" placeholder="Your message" formControlName="message"></textarea>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="submit-button">Submit</button>
    </div>
  </form>
</div>


<app-chatbot></app-chatbot>
<app-footer-user></app-footer-user>
