
<app-header-user ></app-header-user>


<br>

<!-- Formations Start -->
<div class="container-xxl py-5">
    <div class="container">
        <h1 class="about-title">NOS FORMATIONS</h1>

      <br>
<br>
<br>

  
    <div class="row g-4">
        <div class="col-lg-3 col-md-6 col-sm-6" *ngFor="let for of formations">
          <div class="card h-100 shadow-sm border-0 text-center p-3">
  
            <!-- Image -->
            <img
              [src]="for.image?.path ? 'http://localhost:3000/' + for.image.path : 'assets/default-formation.jpg'"
              class="img-fluid mb-3"
              style="height: 160px; object-fit: cover; border-radius: 12px;"
              alt="Formation image"
            />
  
            <div class="card-body p-2">
              <h5 class="card-title fw-bold">{{ for.name }}</h5>
  
              <p class="text-muted mb-1" *ngIf="for.formateur">
                {{ for.formateur.name }}
              </p>
  
              <h6 class="text-primary mb-3">{{ for.prix | currency:'TND':'symbol'}}</h6>
  
              <a
                routerLink="/DetailsFormation/{{ for._id }}"
                class="btn btn-primary btn-sm"
              >
                En savoir plus
              </a>
  
              <!-- Like Button (si connecté) -->
              <button
                *ngIf="user"
                class="btn btn-sm"
                [ngClass]="isLiked(for._id) ? 'btn-danger' : 'btn-light'"
                (click)="isLiked(for._id) ? unlikeTraining(for._id) : likeTraining(for._id)"
              >
                <i class="fas fa-thumbs-up"></i>
                {{ isLiked(for._id) ? 'Je n\'aime plus' : 'J\'aime' }}
                <span class="count">({{ for.likesCount || 0 }})</span>
              </button>
  
              <!-- Like Button (visiteur) -->
              <button
                *ngIf="!user"
                class="btn btn-light btn-sm"
                disabled
                style="pointer-events: none; opacity: 0.7; cursor: default;"
              >
                <i class="fas fa-thumbs-up"></i>
                {{ for.likesCount || 0 }} j’aime
              </button>
            </div>
          </div>
        </div>
      </div>  
    </div>
  </div>
  <!-- Formations End -->
  
  <app-chatbot></app-chatbot>
<app-footer-user></app-footer-user>
